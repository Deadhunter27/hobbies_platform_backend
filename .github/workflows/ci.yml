# CI pipeline (ADR-0007). Required checks per PR: format, lint, typecheck,
# build, unit tests, DB-gated integration + e2e tests, OpenAPI staleness
# gate, commit message linting. CodeQL runs as a separate workflow.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm typecheck

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm build

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm test:unit

  integration-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: hobbies
          POSTGRES_PASSWORD: hobbies
          POSTGRES_DB: hobbies_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hobbies -d hobbies_dev"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      NODE_ENV: test
      PORT: 3000
      LOG_LEVEL: info
      DATABASE_URL: postgresql://hobbies:hobbies@localhost:5432/hobbies_dev
      JWT_SECRET: ci-only-test-secret-not-used-anywhere-real-0000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm db:migrate
      - run: pnpm db:seed
      - run: pnpm test:integration
      - run: pnpm test:e2e

  openapi-check:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      PORT: 3000
      LOG_LEVEL: info
      # No Postgres service needed: PrismaService connects lazily, so the
      # app can construct (and the OpenAPI doc can be generated) with only
      # a syntactically valid, unreachable DATABASE_URL. Verified locally.
      DATABASE_URL: postgresql://hobbies:hobbies@localhost:5432/hobbies_dev
      JWT_SECRET: ci-only-test-secret-not-used-anywhere-real-0000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm openapi:generate
      - run: git diff --exit-code -- openapi/openapi.json

  docker:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: hobbies
          POSTGRES_PASSWORD: hobbies
          POSTGRES_DB: hobbies_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hobbies -d hobbies_dev"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t hobbies-backend:ci .
      - name: Boot the image and probe health endpoints
        run: |
          docker run -d --name api --network host \
            -e NODE_ENV=production -e PORT=3000 -e LOG_LEVEL=info \
            -e DATABASE_URL=postgresql://hobbies:hobbies@localhost:5432/hobbies_dev \
            -e JWT_SECRET=ci-only-test-secret-not-used-anywhere-real-0000 \
            hobbies-backend:ci
          live=""
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/health/live > /dev/null; then live=1; break; fi
            sleep 2
          done
          if [ -z "$live" ]; then echo "::error::API never became live"; docker logs api; exit 1; fi
          curl -fsS http://localhost:3000/health/live
          curl -fsS http://localhost:3000/health/ready || { docker logs api; exit 1; }
          docker logs api

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
